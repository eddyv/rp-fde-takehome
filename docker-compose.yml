services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v25.3.15
    command:
      - redpanda
      - start
      - --mode=dev-container
      - --smp=1
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:19092
    ports:
      - "19092:19092" # Kafka API for host-side debugging (rpk/kcat against localhost:19092)
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true'"]
      interval: 5s
      timeout: 5s
      retries: 12

  # One-shot: create the topics so consumers don't race auto-creation.
  # The DLQ never expires: terminal failure evidence must outlive retention.
  # rpk exits 1 for an existing topic, so tolerate only TOPIC_ALREADY_EXISTS
  # and fail the container on any other error ($$ = compose escaping).
  topic-init:
    image: docker.redpanda.com/redpandadata/redpanda:v25.3.15
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        create() {
          out=$$(rpk topic create "$$@" -X brokers=redpanda:9092 2>&1) ||
            echo "$$out" | grep -q TOPIC_ALREADY_EXISTS ||
            { echo "$$out" >&2; exit 1; }
          echo "$$out"
        }
        create wiki.edits.raw
        create wiki.edits.retry
        create wiki.edits.dlq -c retention.ms=-1

  connect:
    image: docker.redpanda.com/redpandadata/connect:4.99.0
    command: ["run", "/pipeline.yaml"]
    volumes:
      - ./connect/pipeline.yaml:/pipeline.yaml:ro
    depends_on:
      redpanda:
        condition: service_healthy
      topic-init:
        condition: service_completed_successfully
    restart: unless-stopped

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: wiki
      POSTGRES_PASSWORD: wiki
      POSTGRES_DB: wiki
    ports:
      - "5433:5432" # host port 5433 to avoid clashing with a local Postgres
    volumes:
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wiki -d wiki"]
      interval: 5s
      timeout: 5s
      retries: 12

  worker:
    build:
      context: .
      dockerfile: service/Dockerfile
    command: ["python", "-m", "app.worker"]
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-haiku-4-5}
      # Empty-string env values break the service (the SDK treats base_url=""
      # as a real URL; pydantic rejects "" for numbers), so default to the
      # SDK's own endpoint and config.py's values instead of passing blanks.
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-https://api.anthropic.com}
      CONFIDENCE_THRESHOLD: ${CONFIDENCE_THRESHOLD:-0.6}
      BREAKER_THRESHOLD: ${BREAKER_THRESHOLD:-25}
      MAX_RETRY_PASSES: ${MAX_RETRY_PASSES:-3}
      RETRY_BACKOFF_BASE_SECONDS: ${RETRY_BACKOFF_BASE_SECONDS:-30}
      RETRY_BACKOFF_MAX_SECONDS: ${RETRY_BACKOFF_MAX_SECONDS:-120}
      KAFKA_BROKERS: redpanda:9092
      KAFKA_TOPIC: wiki.edits.raw
      POSTGRES_DSN: postgresql://wiki:wiki@postgres:5432/wiki
    depends_on:
      redpanda:
        condition: service_healthy
      topic-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Consumes wiki.edits.retry: delayed, bounded re-attempts of transient
  # failures; exhausted messages promote to wiki.edits.dlq.
  retrier:
    build:
      context: .
      dockerfile: service/Dockerfile
    command: ["python", "-m", "app.retrier"]
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-haiku-4-5}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-https://api.anthropic.com}
      CONFIDENCE_THRESHOLD: ${CONFIDENCE_THRESHOLD:-0.6}
      BREAKER_THRESHOLD: ${BREAKER_THRESHOLD:-25}
      MAX_RETRY_PASSES: ${MAX_RETRY_PASSES:-3}
      RETRY_BACKOFF_BASE_SECONDS: ${RETRY_BACKOFF_BASE_SECONDS:-30}
      RETRY_BACKOFF_MAX_SECONDS: ${RETRY_BACKOFF_MAX_SECONDS:-120}
      KAFKA_BROKERS: redpanda:9092
      POSTGRES_DSN: postgresql://wiki:wiki@postgres:5432/wiki
    depends_on:
      redpanda:
        condition: service_healthy
      topic-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: service/Dockerfile
    command: ["uvicorn", "app.api:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      POSTGRES_DSN: postgresql://wiki:wiki@postgres:5432/wiki
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

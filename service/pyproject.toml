[project]
name = "reasoning-service"
version = "0.1.0"
description = "Consumes wiki.edits.raw, classifies edits with Claude, writes to Postgres, serves results."
requires-python = ">=3.13"
dependencies = [
    "kafka-python==3.0.7",
    "anthropic==0.116.0",
    "psycopg[binary]==3.3.4",
    "fastapi==0.139.0",
    "uvicorn==0.51.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["app"]
